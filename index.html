<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASIAPAC | Rate Finder</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- SheetJS (lee Excel .xlsx en el navegador) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="container">
    <header class="header">
      <img class="logo" src="assets/asiapac-logo.png" alt="ASIAPAC" />
    </header>

    <section class="card">
      <h1 class="title">Rate Finder</h1>

      <div class="filters">
        <!-- POL autocomplete -->
        <div class="field">
          <label for="polInput">Puerto de Embarque (POL)</label>
          <div class="combo" data-combo="pol">
            <input id="polInput" type="text" autocomplete="off" placeholder="Escribe o selecciona POL" />
            <button class="combo-btn" type="button" aria-label="Abrir opciones POL">▾</button>
            <div class="combo-menu" role="listbox" id="polMenu"></div>
          </div>
        </div>

        <!-- POD autocomplete -->
        <div class="field">
          <label for="podInput">Puerto de Destino (POD)</label>
          <div class="combo" data-combo="pod">
            <input id="podInput" type="text" autocomplete="off" placeholder="Escribe o selecciona POD" />
            <button class="combo-btn" type="button" aria-label="Abrir opciones POD">▾</button>
            <div class="combo-menu" role="listbox" id="podMenu"></div>
          </div>
        </div>

        <button id="searchBtn" class="btn" type="button">Buscar</button>
      </div>

      <p id="status" class="status"></p>
    </section>

    <section class="card">
      <h2 class="subtitle">Resultados</h2>
      <div id="results"></div>
    </section>

    <section class="card">
      <h2 class="subtitle">Gastos locales</h2>
      <div id="localCharges" class="local"></div>
    </section>

    <section class="card">
      <h2 class="subtitle">Remarks</h2>
      <div id="remarksSection" class="remarks"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
